<!DOCTYPE html>
<html>
<head>
  <!-- <link rel="stylesheet" href="/static/css/style.css"> -->
  <link rel="stylesheet" href="/static/css/style.css?v=999">

</head>

<body>

  <div class="card">
    <h2>Speech Test</h2>
    <h3>Please try to describe the image for at least 30 seconds</h3>

    <img src="/static/images/image.png" width="250" />

    <!-- 🔴 REC indicator -->
    <div id="rec-indicator">
      <span class="dot"></span> REC
    </div>

    <!-- ⏳ Progress bar -->
    <div class="progress-container">
      <div id="progress-bar"></div>
    </div>

    <!-- 🎙️ Mic animation -->
    <div id="mic-animation">🎙️</div>

    <!-- ⏱️ Timer -->
    <p id="timer">00:00</p>

    <button id="start">Start Recording</button>
    <button id="stop" disabled>Stop Recording</button>

    <!-- Status messages -->
    <p id="status"></p>
    <p id="min-status"></p>
  </div>

  <!-- JS only here -->
  <script src="/static/js/record.js?v=2"></script>

</body>
</html>
