<!DOCTYPE html>
<html>
<head>
  <title>Result</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>

<body class="result-page">

  <div class="result-container">

    <h2>Alzheimer Detection Result</h2>

    <!-- DO NOT change class or id -->
    <div class="card" id="result-card">
      <p>Loading result...</p>
    </div>

    <button onclick="window.location.href='/'">
      Test Another Patient
    </button>

  </div>

  <script>
    const result = JSON.parse(sessionStorage.getItem("prediction_result"));

    const card = document.getElementById("result-card");

    if (result) {
      card.innerHTML = `
        <p><strong>Classification:</strong> ${result.classification}</p>
        <p><strong>MMSE Score:</strong> ${result.mmse_score}</p>
        
      `;
    } else {
      card.innerHTML = "<p>No prediction available.</p>";
    }
  </script>

</body>
</html>
